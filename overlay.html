<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YT Live Monitor — Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --ink:#FFFFFF;
    --ink-dim:#B0B0B0;
    --accent:#E8231B;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:transparent;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:'Space Grotesk',sans-serif;
  }

  #stage{
    display:flex;
    width:100vw;
    height:100vh;
    padding:24px;
  }
  #stage.pos-top-left{ align-items:flex-start; justify-content:flex-start; }
  #stage.pos-top-right{ align-items:flex-start; justify-content:flex-end; }
  #stage.pos-bottom-left{ align-items:flex-end; justify-content:flex-start; }
  #stage.pos-bottom-right{ align-items:flex-end; justify-content:flex-end; }

  #bar{
    display:flex;
    align-items:center;
    gap:20px;
    opacity:0;
    animation:rise 0.6s ease forwards;
  }
  @keyframes rise{ to{ opacity:1; } }

  /* theme: minimal — flat text over footage, no panel */
  .theme-minimal{ padding:0; }
  .theme-minimal .label,
  .theme-minimal .num,
  .theme-minimal .clock,
  .theme-minimal .date .day,
  .theme-minimal .date .full{
    text-shadow:0 2px 6px rgba(0,0,0,0.9);
  }
  .theme-minimal .eye{ filter:drop-shadow(0 2px 4px rgba(0,0,0,0.9)); }

  /* theme: glass — translucent blurred panel, no dividers */
  .theme-glass{
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:10px;
    padding:14px 22px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
  }

  /* theme: solid — opaque flat panel */
  .theme-solid{
    border-radius:8px;
    padding:14px 22px;
  }

  /* theme: outline — border with a light fill */
  .theme-outline{
    border:2px solid var(--accent);
    border-radius:8px;
    padding:12px 20px;
  }

  /* theme: bordered — blurred panel with divider lines between elements */
  .theme-bordered{
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:10px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
    gap:0;
  }
  .theme-bordered .cell{
    padding:14px 18px;
    border-left:1px solid rgba(255,255,255,0.14);
  }
  .theme-bordered .cell.no-divider{
    border-left:none;
  }

  .cell{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .tally-dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--accent);
    animation:pulse 1.6s ease-in-out infinite;
    flex-shrink:0;
  }
  @keyframes pulse{
    0%,100%{ opacity:1; }
    50%{ opacity:0.35; }
  }
  .tally-dot.off{
    background:var(--ink-dim);
    animation:none;
  }

  .label{
    font-size:15px;
    font-weight:700;
    letter-spacing:0.05em;
    color:var(--ink);
    text-transform:uppercase;
  }

  .eye{
    width:18px;
    height:18px;
    flex-shrink:0;
  }
  .eye path,.eye circle{
    stroke:var(--accent);
    stroke-width:1.8;
    fill:none;
  }
  .eye.off path,.eye.off circle{
    stroke:var(--ink-dim);
  }

  .num{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:17px;
    color:var(--ink);
    font-variant-numeric:tabular-nums;
  }

  .clock{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    font-size:20px;
    color:var(--ink);
    font-variant-numeric:tabular-nums;
    letter-spacing:0.02em;
  }
  .clock .sec{
    color:var(--ink-dim);
    font-size:15px;
  }

  .date{
    display:flex;
    flex-direction:column;
    justify-content:center;
    line-height:1.25;
  }
  .date .day{
    font-size:14px;
    font-weight:700;
    color:var(--ink);
  }
  .date .full{
    font-size:12px;
    font-weight:700;
    color:var(--ink-dim);
    letter-spacing:0.02em;
  }

  #configError{
    display:none;
    position:fixed;
    inset:0;
    align-items:center;
    justify-content:center;
    background:#0b0b0a;
    color:#F2EEE3;
    font-family:'Space Grotesk',sans-serif;
    font-size:13px;
    text-align:center;
    padding:24px;
    line-height:1.6;
  }
  #configError code{
    background:#1D1D1A;
    padding:2px 6px;
    border-radius:4px;
  }
</style>
</head>
<body>

<div id="stage" class="pos-top-left">
  <div id="bar" class="theme-minimal">
    <div class="cell" id="cellLive">
      <div class="tally-dot off" id="tallyDot"></div>
      <span class="label" id="liveLabel">OFFLINE</span>
    </div>
    <div class="cell" id="cellViewers">
      <svg class="eye" id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
      <span class="num" id="viewerCount">--</span>
    </div>
    <div class="cell" id="cellClock">
      <span class="clock" id="clockTime">--:--<span class="sec">:--</span></span>
    </div>
    <div class="cell" id="cellDate">
      <div class="date">
        <span class="day" id="dateDay">--</span>
        <span class="full" id="dateFull">-- -- --</span>
      </div>
    </div>
  </div>
</div>

<div id="configError">
  <div>
    <p><strong>No config.js found (or it's invalid).</strong></p>
    <p>Open <code>configurator.html</code> in a browser, set up your overlay, and download <code>config.js</code>.<br>
    Then place that file in the same folder as <code>overlay.html</code> and reload this page.</p>
  </div>
</div>

<!-- config.js defines window.YT_LIVE_MONITOR_CONFIG -->
<script src="config.js" onerror="window.__configLoadFailed = true;"></script>

<script>
(function(){
  function hexToRgba(hex, alpha){
    if(!hex) return 'rgba(20,20,20,' + alpha + ')';
    var h = hex.replace('#','');
    if(h.length === 3){ h = h.split('').map(function(c){ return c+c; }).join(''); }
    var r = parseInt(h.substring(0,2),16);
    var g = parseInt(h.substring(2,4),16);
    var b = parseInt(h.substring(4,6),16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  function updateDividers(bar){
    var cells = bar.querySelectorAll('.cell');
    var seenVisible = false;
    cells.forEach(function(c){
      var visible = c.style.display !== 'none';
      c.classList.toggle('no-divider', visible && !seenVisible);
      if(visible) seenVisible = true;
    });
  }

  function applyConfig(cfg){
    var bar = document.getElementById('bar');
    document.getElementById('stage').className = 'pos-' + (cfg.position || 'top-left');
    bar.className = 'theme-' + (cfg.theme || 'minimal');
    document.documentElement.style.setProperty('--accent', cfg.accent || '#e8231b');

    var bg = cfg.background || '#141414';
    if(cfg.theme === 'solid'){ bar.style.background = hexToRgba(bg, 1); }
    else if(cfg.theme === 'glass' || cfg.theme === 'bordered'){ bar.style.background = hexToRgba(bg, 0.62); }
    else if(cfg.theme === 'outline'){ bar.style.background = hexToRgba(bg, 0.25); }
    else { bar.style.background = 'transparent'; }

    document.getElementById('cellLive').style.display = cfg.showLive === false ? 'none' : 'flex';
    document.getElementById('cellViewers').style.display = cfg.showViewers === false ? 'none' : 'flex';
    document.getElementById('cellClock').style.display = cfg.showClock === false ? 'none' : 'flex';
    document.getElementById('cellDate').style.display = cfg.showDate === false ? 'none' : 'flex';
    updateDividers(bar);
  }

  function setState(state, viewers){
    var dot = document.getElementById('tallyDot');
    var label = document.getElementById('liveLabel');
    var count = document.getElementById('viewerCount');
    var eye = document.getElementById('eyeIcon');

    if(state === 'live'){
      dot.classList.remove('off');
      eye.classList.remove('off');
      label.textContent = 'LIVE';
      count.textContent = Number(viewers).toLocaleString();
    } else if(state === 'offline'){
      dot.classList.add('off');
      eye.classList.add('off');
      label.textContent = 'OFFLINE';
      count.textContent = '--';
    } else if(state === 'error'){
      dot.classList.add('off');
      eye.classList.add('off');
      label.textContent = 'API ERROR';
      count.textContent = '--';
    } else {
      dot.classList.add('off');
      eye.classList.add('off');
      label.textContent = 'CONN ERROR';
      count.textContent = '--';
    }
  }

  function fetchViewersByVideo(key, video){
    var url = 'https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=' +
      encodeURIComponent(video) + '&key=' + encodeURIComponent(key);
    fetch(url)
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data.error){ setState('error'); return; }
        var item = data.items && data.items[0];
        var details = item && item.liveStreamingDetails;

        var isLive = !!(details && details.actualStartTime && !details.actualEndTime);

        if(isLive){
          var viewers = details.concurrentViewers !== undefined ? details.concurrentViewers : 0;
          setState('live', viewers);
        } else {
          setState('offline');
        }
      })
      .catch(function(){ setState('connerror'); });
  }

  function startFixedPolling(key, video){
    fetchViewersByVideo(key, video);
    setInterval(function(){ fetchViewersByVideo(key, video); }, 30000);
  }

  function normalizeChannelInput(raw){
    var v = raw.trim();
    v = v.replace(/^https?:\/\/(www\.)?youtube\.com\//i, '');
    v = v.replace(/^@/, '');
    v = v.replace(/^channel\//i, '');
    v = v.split('?')[0].replace(/\/$/, '');
    return v;
  }

  function resolveChannelId(key, raw, callback){
    var cleaned = normalizeChannelInput(raw);
    if(/^UC[a-zA-Z0-9_-]{22}$/.test(cleaned)){
      callback(cleaned);
      return;
    }
    var url = 'https://www.googleapis.com/youtube/v3/channels?part=id&forHandle=' +
      encodeURIComponent(cleaned) + '&key=' + encodeURIComponent(key);
    fetch(url)
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data.error){ setState('error'); return; }
        var item = data.items && data.items[0];
        if(item){ callback(item.id); } else { setState('error'); }
      })
      .catch(function(){ setState('connerror'); });
  }

  function startChannelPolling(key, channelRaw){
    var liveVideoId = null;
    var resolvedChannelId = null;

    function discover(){
      var url = 'https://www.googleapis.com/youtube/v3/search?part=id&channelId=' +
        encodeURIComponent(resolvedChannelId) + '&eventType=live&type=video&key=' + encodeURIComponent(key);
      fetch(url)
        .then(function(res){ return res.json(); })
        .then(function(data){
          if(data.error){ setState('error'); liveVideoId = null; return; }
          var item = data.items && data.items[0];
          liveVideoId = item ? item.id.videoId : null;
          if(liveVideoId){ fetchViewersByVideo(key, liveVideoId); } else { setState('offline'); }
        })
        .catch(function(){ setState('connerror'); });
    }

    resolveChannelId(key, channelRaw, function(id){
      resolvedChannelId = id;
      discover();
      setInterval(discover, 600000);
      setInterval(function(){
        if(liveVideoId){ fetchViewersByVideo(key, liveVideoId); }
      }, 30000);
    });
  }

  function pad(n){ return n < 10 ? '0' + n : '' + n; }

  function tickClock(){
    var now = new Date();
    var timeEl = document.getElementById('clockTime');
    timeEl.innerHTML = pad(now.getHours()) + ':' + pad(now.getMinutes()) +
      '<span class="sec">:' + pad(now.getSeconds()) + '</span>';

    var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    document.getElementById('dateDay').textContent = days[now.getDay()];
    document.getElementById('dateFull').textContent =
      months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  }

  var cfg = window.YT_LIVE_MONITOR_CONFIG;

  if(window.__configLoadFailed || !cfg || !cfg.key || (!cfg.video && !cfg.channel)){
    document.getElementById('configError').style.display = 'flex';
    return;
  }

  applyConfig(cfg);
  if(cfg.mode === 'channel'){
    startChannelPolling(cfg.key, cfg.channel);
  } else {
    startFixedPolling(cfg.key, cfg.video);
  }

  tickClock();
  setInterval(tickClock, 1000);
})();
</script>

</body>
</html>
